<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMate - 5x5 Workout Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #1a1612;
      color: #fef9f0;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      background: linear-gradient(135deg, #2a2218 0%, #1a1612 100%);
      padding: 20px;
      border-bottom: 3px solid #E89B4E;
      margin-bottom: 30px;
    }
    
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }
    
    .subtitle {
      color: #b89a7a;
      font-size: 0.9rem;
    }
    
    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: #2a2218;
      padding: 10px;
      border-radius: 12px;
      overflow-x: auto;
    }
    
    .nav-tabs button {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: #e8d4b8;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .nav-tabs button:hover {
      background: #3a301e;
      color: #fef9f0;
    }
    
    .nav-tabs button.active {
      background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%);
      color: #1a1612;
    }
    
    .card {
      background: linear-gradient(180deg, #2d2419 0%, #221c14 100%);
      border: 1px solid #4a3d2e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .card h2 {
      color: #E89B4E;
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    
    .card h3 {
      color: #F4CB80;
      font-size: 1.2rem;
      margin-bottom: 12px;
    }
    
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      width: 100%;
      margin-bottom: 12px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%);
      color: #1a1612;
    }
    
    .btn-secondary {
      background: #2a2218;
      color: #fef9f0;
      border: 1px solid #4a3d2e;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #2a2218;
      border: 1px solid #4a3d2e;
      border-radius: 8px;
      color: #fef9f0;
      font-size: 1rem;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #e8d4b8;
      font-weight: 600;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: #1a1612;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 2px solid #E89B4E;
    }
    
    .exercise-item {
      background: #2a2218;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid #E89B4E;
    }
    
    .exercise-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #F4CB80;
      margin-bottom: 8px;
    }
    
    .exercise-details {
      color: #b89a7a;
      font-size: 0.9rem;
    }
    
    .workout-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      background: #3a301e;
      border-radius: 8px;
    }
    
    .text-muted {
      color: #b89a7a;
    }
    
    footer {
      text-align: center;
      padding: 20px;
      color: #b89a7a;
      font-size: 0.9rem;
      border-top: 1px solid #4a3d2e;
      margin-top: 40px;
    }
    
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(26, 22, 18, 0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    
    .loading.active {
      display: flex;
    }
    
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #4a3d2e;
      border-top: 4px solid #E89B4E;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>FORMate</h1>
      <div class="subtitle">5x5 Strength Training Tracker</div>
    </div>
  </header>
  
  <div class="container">
    <div class="nav-tabs">
      <button class="active" data-tab="workout" onclick="switchTab('workout')">Workout</button>
      <button data-tab="progress" onclick="switchTab('progress')">Progress</button>
      <button data-tab="profile" onclick="switchTab('profile')">Profile</button>
    </div>
    
    <div id="content"></div>
  </div>
  
  <footer>
    <div class="container">
      &copy; 2025 FORMate. Built for lifters, by lifters.
    </div>
  </footer>
  
  <div id="modal" class="modal">
    <div class="modal-content" id="modal-content"></div>
  </div>
  
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #E89B4E;">Loading...</p>
  </div>

  <script>
    // State management
    const state = {
      currentTab: 'workout',
      user: null,
      workouts: [],
      currentWorkout: null
    };
    
    const WORKOUTS = {
      A: [
        { name: 'Squat', sets: 5, reps: 5, weight: 0 },
        { name: 'Bench Press', sets: 5, reps: 5, weight: 0 },
        { name: 'Barbell Row', sets: 5, reps: 5, weight: 0 }
      ],
      B: [
        { name: 'Squat', sets: 5, reps: 5, weight: 0 },
        { name: 'Overhead Press', sets: 5, reps: 5, weight: 0 },
        { name: 'Deadlift', sets: 1, reps: 5, weight: 0 }
      ]
    };
    
    // Utility functions
    function showLoading() {
      document.getElementById('loading').classList.add('active');
    }
    
    function hideLoading() {
      document.getElementById('loading').classList.remove('active');
    }
    
    function showModal(content) {
      document.getElementById('modal-content').innerHTML = content;
      document.getElementById('modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    // Storage functions
    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }
    
    function loadFromStorage(key) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : null;
    }
    
    // Tab switching
    function switchTab(tab) {
      state.currentTab = tab;
      
      // Update active button
      document.querySelectorAll('.nav-tabs button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      
      // Render content
      render();
    }
    
    // Onboarding
    function startOnboarding() {
      showModal(`
        <h2>Welcome to FORMate!</h2>
        <p class="text-muted" style="margin-bottom: 24px;">Let's set up your 5x5 program</p>
        
        <form onsubmit="completeOnboarding(event)">
          <label>Name</label>
          <input type="text" name="name" required placeholder="Your name">
          
          <label>Experience Level</label>
          <select name="experience" required>
            <option value="">Select...</option>
            <option value="beginner">Beginner (0-6 months)</option>
            <option value="intermediate">Intermediate (6-24 months)</option>
            <option value="advanced">Advanced (2+ years)</option>
          </select>
          
          <label>Starting Weight - Squat (lbs)</label>
          <input type="number" name="squat" value="45" required>
          
          <label>Starting Weight - Bench Press (lbs)</label>
          <input type="number" name="bench" value="45" required>
          
          <label>Starting Weight - Overhead Press (lbs)</label>
          <input type="number" name="ohp" value="45" required>
          
          <label>Starting Weight - Deadlift (lbs)</label>
          <input type="number" name="deadlift" value="95" required>
          
          <label>Starting Weight - Barbell Row (lbs)</label>
          <input type="number" name="row" value="65" required>
          
          <button type="submit" class="btn btn-primary">Start Training!</button>
        </form>
      `);
    }
    
    function completeOnboarding(event) {
      event.preventDefault();
      const form = event.target;
      
      state.user = {
        name: form.name.value,
        experience: form.experience.value,
        weights: {
          'Squat': parseInt(form.squat.value),
          'Bench Press': parseInt(form.bench.value),
          'Overhead Press': parseInt(form.ohp.value),
          'Deadlift': parseInt(form.deadlift.value),
          'Barbell Row': parseInt(form.row.value)
        },
        startDate: new Date().toISOString()
      };
      
      saveToStorage('user', state.user);
      closeModal();
      render();
    }
    
    // Start workout
    function startWorkout(type) {
      const exercises = WORKOUTS[type].map(ex => ({
        ...ex,
        weight: state.user.weights[ex.name] || ex.weight,
        completedSets: []
      }));
      
      state.currentWorkout = {
        type,
        exercises,
        startTime: new Date().toISOString(),
        currentExerciseIndex: 0
      };
      
      showWorkoutModal();
    }
    
    function showWorkoutModal() {
      const workout = state.currentWorkout;
      const currentEx = workout.exercises[workout.currentExerciseIndex];
      
      const content = `
        <h2>Workout ${workout.type}</h2>
        <div class="workout-info">
          <span>Exercise ${workout.currentExerciseIndex + 1} of ${workout.exercises.length}</span>
          <span>${currentEx.completedSets.length} / ${currentEx.sets} sets</span>
        </div>
        
        <div class="exercise-item">
          <div class="exercise-name">${currentEx.name}</div>
          <div class="exercise-details">${currentEx.sets} sets × ${currentEx.reps} reps @ ${currentEx.weight} lbs</div>
        </div>
        
        <button class="btn btn-primary" onclick="logSet()">
          Log Set ${currentEx.completedSets.length + 1}
        </button>
        
        ${currentEx.completedSets.length > 0 ? `
          <button class="btn btn-secondary" onclick="skipExercise()">
            Skip to Next Exercise
          </button>
        ` : ''}
        
        <button class="btn btn-secondary" onclick="endWorkout()">
          End Workout
        </button>
      `;
      
      showModal(content);
    }
    
    function logSet() {
      const workout = state.currentWorkout;
      const currentEx = workout.exercises[workout.currentExerciseIndex];
      
      currentEx.completedSets.push({
        reps: currentEx.reps,
        weight: currentEx.weight,
        time: new Date().toISOString()
      });
      
      // Check if exercise is complete
      if (currentEx.completedSets.length >= currentEx.sets) {
        // Move to next exercise
        workout.currentExerciseIndex++;
        
        // Check if workout is complete
        if (workout.currentExerciseIndex >= workout.exercises.length) {
          completeWorkout();
          return;
        }
      }
      
      showWorkoutModal();
    }
    
    function skipExercise() {
      const workout = state.currentWorkout;
      workout.currentExerciseIndex++;
      
      if (workout.currentExerciseIndex >= workout.exercises.length) {
        completeWorkout();
        return;
      }
      
      showWorkoutModal();
    }
    
    function completeWorkout() {
      state.currentWorkout.endTime = new Date().toISOString();
      state.workouts.push(state.currentWorkout);
      saveToStorage('workouts', state.workouts);
      
      // Update weights (simple progression)
      state.currentWorkout.exercises.forEach(ex => {
        if (ex.completedSets.length >= ex.sets) {
          state.user.weights[ex.name] += (ex.name === 'Deadlift' ? 10 : 5);
        }
      });
      saveToStorage('user', state.user);
      
      showModal(`
        <h2>🎉 Workout Complete!</h2>
        <p style="margin: 20px 0;">Great job! You completed Workout ${state.currentWorkout.type}.</p>
        <button class="btn btn-primary" onclick="closeModal(); render();">
          Done
        </button>
      `);
      
      state.currentWorkout = null;
    }
    
    function endWorkout() {
      if (confirm('Are you sure you want to end this workout?')) {
        state.currentWorkout = null;
        closeModal();
        render();
      }
    }
    
    // Rendering
    function renderWorkout() {
      return `
        <div class="card">
          <h2>Start Your Workout</h2>
          <p class="text-muted" style="margin-bottom: 24px;">Choose your program for today</p>
          
          <button class="btn btn-primary" onclick="startWorkout('A')">
            Workout A
            <div class="text-muted" style="font-size: 0.9rem; margin-top: 4px;">Squat · Bench · Row</div>
          </button>
          
          <button class="btn btn-primary" onclick="startWorkout('B')">
            Workout B
            <div class="text-muted" style="font-size: 0.9rem; margin-top: 4px;">Squat · OHP · Deadlift</div>
          </button>
        </div>
        
        <div class="card">
          <h3>About 5x5 Training</h3>
          <p class="text-muted">The 5x5 program is a simple yet effective strength training routine. Perform 5 sets of 5 reps for each exercise, progressively adding weight each session.</p>
        </div>
      `;
    }
    
    function renderProgress() {
      if (state.workouts.length === 0) {
        return `
          <div class="card">
            <h2>Progress</h2>
            <p class="text-muted">No workouts logged yet. Complete your first workout to see your progress!</p>
          </div>
        `;
      }
      
      const workoutHistory = state.workouts.map((w, i) => `
        <div class="exercise-item">
          <div class="exercise-name">Workout ${w.type} - ${new Date(w.startTime).toLocaleDateString()}</div>
          <div class="exercise-details">
            ${w.exercises.map(ex => `${ex.name}: ${ex.completedSets.length}/${ex.sets} sets`).join(' · ')}
          </div>
        </div>
      `).join('');
      
      return `
        <div class="card">
          <h2>Workout History</h2>
          <p class="text-muted" style="margin-bottom: 16px;">Total Workouts: ${state.workouts.length}</p>
          ${workoutHistory}
        </div>
      `;
    }
    
    function renderProfile() {
      if (!state.user) {
        return '<div class="card"><p>No profile found</p></div>';
      }
      
      const weights = Object.entries(state.user.weights).map(([name, weight]) => `
        <div class="exercise-item">
          <div class="exercise-name">${name}</div>
          <div class="exercise-details">${weight} lbs</div>
        </div>
      `).join('');
      
      return `
        <div class="card">
          <h2>Profile</h2>
          <p><strong>Name:</strong> ${state.user.name}</p>
          <p><strong>Experience:</strong> ${state.user.experience}</p>
          <p class="text-muted"><strong>Training since:</strong> ${new Date(state.user.startDate).toLocaleDateString()}</p>
        </div>
        
        <div class="card">
          <h2>Current Weights</h2>
          ${weights}
        </div>
      `;
    }
    
    function render() {
      const content = document.getElementById('content');
      
      switch(state.currentTab) {
        case 'workout':
          content.innerHTML = renderWorkout();
          break;
        case 'progress':
          content.innerHTML = renderProgress();
          break;
        case 'profile':
          content.innerHTML = renderProfile();
          break;
      }
    }
    
    // Initialize app
    function init() {
      showLoading();
      
      // Load user data
      state.user = loadFromStorage('user');
      state.workouts = loadFromStorage('workouts') || [];
      
      hideLoading();
      
      if (!state.user) {
        startOnboarding();
      } else {
        render();
      }
    }
    
    // Start app
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
