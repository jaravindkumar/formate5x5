<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1612">
  <title>FORMate - 5x5 AI Form Tracker</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="camera-recording-styles.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #1a1612; color: #fef9f0; line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      background: linear-gradient(135deg, #2a2218 0%, #1a1612 100%);
      padding: 20px; border-bottom: 3px solid #E89B4E; margin-bottom: 30px;
    }
    h1 {
      font-size: 2rem; background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #b89a7a; font-size: 0.9rem; }
    .nav-tabs {
      display: flex; gap: 10px; margin-bottom: 30px; background: #2a2218;
      padding: 10px; border-radius: 12px; overflow-x: auto;
    }
    .nav-tabs button {
      padding: 12px 24px; background: transparent; border: none;
      color: #e8d4b8; font-size: 1rem; font-weight: 600; cursor: pointer;
      border-radius: 8px; transition: all 0.2s;
    }
    .nav-tabs button:hover { background: #3a301e; color: #fef9f0; }
    .nav-tabs button.active {
      background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%);
      color: #1a1612;
    }
    .card {
      background: linear-gradient(180deg, #2d2419 0%, #221c14 100%);
      border: 1px solid #4a3d2e; border-radius: 16px; padding: 24px; margin-bottom: 20px;
    }
    .card h2 { color: #E89B4E; font-size: 1.5rem; margin-bottom: 16px; }
    .btn {
      padding: 14px 28px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.2s; width: 100%; margin-bottom: 12px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%);
      color: #1a1612;
    }
    .btn-secondary { background: #2a2218; color: #fef9f0; border: 1px solid #4a3d2e; }
    input, select { 
      width: 100%; padding: 12px; margin-bottom: 16px; background: #2a2218;
      border: 1px solid #4a3d2e; border-radius: 8px; color: #fef9f0; font-size: 1rem;
    }
    label { display: block; margin-bottom: 8px; color: #e8d4b8; font-weight: 600; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9); z-index: 1000; align-items: center;
      justify-content: center; padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1612; border-radius: 16px; padding: 32px;
      max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto;
      border: 2px solid #E89B4E;
    }
    .text-muted { color: #b89a7a; }
    .hidden { display: none; }
    
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(400px); opacity: 0; }
    }
    
    .ml-badge {
      display: inline-block;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>FORMate</h1>
      <div class="subtitle">5x5 Training + AI Form Analysis</div>
    </div>
  </header>
  
  <div class="container">
    <div class="nav-tabs">
      <button class="active" onclick="switchTab('workout')">Workout</button>
      <button onclick="switchTab('progress')">Progress</button>
      <button onclick="switchTab('profile')">Profile</button>
      <button onclick="switchTab('settings')">Settings</button>
    </div>
    <div id="content"></div>
  </div>
  
  <div id="modal" class="modal">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <!-- Load all ML modules -->
  <script src="form-analysis-config.js"></script>
  <script src="camera-mediapipe-system.js"></script>
  <script src="ai-coaching-progression.js"></script>
  <script src="storage-voice-controls.js"></script>
  
  <script>
    // Main app state
    const state = {
      currentTab: 'workout',
      user: null,
      workouts: [],
      currentWorkout: null,
      mlEnabled: false
    };
    
    const WORKOUTS = {
      A: [
        { id: 'squat', name: 'Squat', sets: 5, reps: 5 },
        { id: 'bench', name: 'Bench Press', sets: 5, reps: 5 },
        { id: 'row', name: 'Barbell Row', sets: 5, reps: 5 }
      ],
      B: [
        { id: 'squat', name: 'Squat', sets: 5, reps: 5 },
        { id: 'ohp', name: 'Overhead Press', sets: 5, reps: 5 },
        { id: 'deadlift', name: 'Deadlift', sets: 1, reps: 5 }
      ]
    };
    
    // Utilities
    function showModal(content) {
      document.getElementById('modal-content').innerHTML = content;
      document.getElementById('modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }
    
    function loadFromStorage(key) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : null;
    }
    
    // Tab switching
    function switchTab(tab) {
      state.currentTab = tab;
      document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.nav-tabs button[onclick*="${tab}"]`).classList.add('active');
      render();
    }
    
    // Onboarding
    function startOnboarding() {
      showModal(`
        <h2>Welcome to FORMate!</h2>
        <p class="text-muted" style="margin-bottom: 24px;">AI-powered 5x5 strength training</p>
        <form onsubmit="completeOnboarding(event)">
          <label>Name</label>
          <input type="text" name="name" required>
          
          <label>Experience</label>
          <select name="experience" required>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
          
          <label>Enable Camera & AI Features?</label>
          <select name="mlEnabled" required>
            <option value="true">Yes - Full AI analysis</option>
            <option value="false">No - Basic tracking only</option>
          </select>
          <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 16px;">
            AI features include: camera form check, rep counting, voice commands
          </p>
          
          <button type="submit" class="btn btn-primary">Start Training!</button>
        </form>
      `);
    }
    
    function completeOnboarding(event) {
      event.preventDefault();
      const form = event.target;
      
      state.user = {
        name: form.name.value,
        experience: form.experience.value,
        mlEnabled: form.mlEnabled.value === 'true',
        weights: {
          squat: 45, bench: 45, ohp: 45, deadlift: 95, row: 65
        },
        startDate: new Date().toISOString()
      };
      state.mlEnabled = state.user.mlEnabled;
      
      saveToStorage('user', state.user);
      closeModal();
      
      if (state.mlEnabled) {
        initializeML();
      }
      
      render();
    }
    
    // Initialize ML features
    async function initializeML() {
      console.log('🚀 Initializing ML features...');
      
      try {
        // Wait for all ML modules to load
        let attempts = 0;
        while ((!window.storageManager || !window.voiceCommands || !window.cameraSetup) && attempts < 50) {
          await new Promise(resolve => setTimeout(resolve, 100));
          attempts++;
        }
        
        if (!window.storageManager || !window.voiceCommands || !window.cameraSetup) {
          console.error('⚠️ ML modules failed to load');
          state.mlEnabled = false;
          return;
        }
        
        // Initialize storage
        await window.storageManager.initialize();
        console.log('✅ Storage initialized');
        
        // Initialize voice commands
        if (window.voiceCommands) {
          window.voiceCommands.initialize();
          console.log('✅ Voice commands ready');
        }
        
        console.log('✅ ML features ready!');
        
        // Show user ML is ready
        const mlStatus = document.createElement('div');
        mlStatus.style.cssText = 'position: fixed; top: 20px; right: 20px; background: linear-gradient(135deg, #F4CB80 0%, #E89B4E 100%); color: #1a1612; padding: 12px 20px; border-radius: 8px; font-weight: 600; z-index: 1000; animation: slideIn 0.5s ease;';
        mlStatus.textContent = '✅ Camera & Voice Ready!';
        document.body.appendChild(mlStatus);
        
        setTimeout(() => {
          mlStatus.style.animation = 'slideOut 0.5s ease';
          setTimeout(() => mlStatus.remove(), 500);
        }, 3000);
        
      } catch (error) {
        console.error('ML initialization error:', error);
        state.mlEnabled = false;
      }
    }
    
    // Workout functions
    function startWorkout(type) {
      const exercises = WORKOUTS[type].map(ex => ({
        ...ex,
        weight: state.user.weights[ex.id] || 45,
        completedSets: []
      }));
      
      state.currentWorkout = {
        type, exercises,
        startTime: new Date().toISOString(),
        currentExerciseIndex: 0
      };
      
      showWorkoutModal();
    }
    
    function showWorkoutModal() {
      const w = state.currentWorkout;
      const ex = w.exercises[w.currentExerciseIndex];
      
      const mlReady = state.mlEnabled && window.cameraSetup && window.workoutRecorder;
      
      showModal(`
        <h2>Workout ${w.type} ${state.mlEnabled ? '<span class="ml-badge">📹 AI</span>' : ''}</h2>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; padding: 12px; background: #3a301e; border-radius: 8px;">
          <span>Exercise ${w.currentExerciseIndex + 1}/${w.exercises.length}</span>
          <span>${ex.completedSets.length}/${ex.sets} sets</span>
        </div>
        
        <div style="background: #2a2218; padding: 16px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #E89B4E;">
          <div style="font-size: 1.2rem; font-weight: 600; color: #F4CB80; margin-bottom: 8px;">
            ${ex.name}
          </div>
          <div class="text-muted">${ex.sets} sets × ${ex.reps} reps @ ${ex.weight} lbs</div>
        </div>
        
        ${mlReady ? `
          <button class="btn btn-primary" onclick="logSetWithCamera()">
            📹 Record Set ${ex.completedSets.length + 1} with Camera
          </button>
          <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 12px; text-align: center;">
            Camera & voice active • Form analysis enabled
          </p>
        ` : state.mlEnabled ? `
          <div style="background: #3a301e; padding: 12px; border-radius: 8px; margin-bottom: 12px;">
            <p class="text-muted" style="font-size: 0.9rem; text-align: center;">
              ⏳ Loading camera system... (wait 10 seconds)
            </p>
          </div>
        ` : ''}
        
        <button class="btn ${state.mlEnabled ? 'btn-secondary' : 'btn-primary'}" onclick="logSetManual()">
          ✓ Log Set ${ex.completedSets.length + 1} ${state.mlEnabled ? '(Manual)' : ''}
        </button>
        
        <button class="btn btn-secondary" onclick="endWorkout()">End Workout</button>
      `);
    }
    
    async function logSetWithCamera() {
      const w = state.currentWorkout;
      const ex = w.exercises[w.currentExerciseIndex];
      
      // Check if camera system loaded
      if (!window.cameraSetup || !window.workoutRecorder) {
        alert('Camera system loading... Please wait 10 seconds and try again.');
        return;
      }
      
      // Set recorder context
      window.workoutRecorder.currentExercise = ex.id;
      window.workoutRecorder.currentSet = ex.completedSets.length + 1;
      
      // Setup callback for when recording completes
      window.workoutRecorder.onRecordingComplete = (result) => {
        // Add set with form analysis
        ex.completedSets.push({
          reps: result.repCount || ex.reps,
          weight: ex.weight,
          time: new Date().toISOString(),
          formScore: result.formScore,
          formGrade: result.formGrade,
          videoId: result.videoId
        });
        
        // Move to next set or exercise
        if (ex.completedSets.length >= ex.sets) {
          w.currentExerciseIndex++;
          if (w.currentExerciseIndex >= w.exercises.length) {
            completeWorkout();
            return;
          }
        }
        
        showWorkoutModal();
      };
      
      // Start camera wizard
      try {
        await window.cameraSetup.start();
      } catch (error) {
        console.error('Camera error:', error);
        alert('Camera failed to start: ' + error.message);
      }
    }
    
    function logSetManual() {
      const w = state.currentWorkout;
      const ex = w.exercises[w.currentExerciseIndex];
      
      ex.completedSets.push({
        reps: ex.reps,
        weight: ex.weight,
        time: new Date().toISOString(),
        formScore: null
      });
      
      if (ex.completedSets.length >= ex.sets) {
        w.currentExerciseIndex++;
        if (w.currentExerciseIndex >= w.exercises.length) {
          completeWorkout();
          return;
        }
      }
      
      showWorkoutModal();
    }
    
    function completeWorkout() {
      state.currentWorkout.endTime = new Date().toISOString();
      state.workouts.push(state.currentWorkout);
      saveToStorage('workouts', state.workouts);
      
      // Progress weights
      state.currentWorkout.exercises.forEach(ex => {
        if (ex.completedSets.length >= ex.sets) {
          state.user.weights[ex.id] += (ex.id === 'deadlift' ? 10 : 5);
        }
      });
      saveToStorage('user', state.user);
      
      showModal(`
        <h2>🎉 Workout Complete!</h2>
        <p style="margin: 20px 0;">Great job on Workout ${state.currentWorkout.type}!</p>
        <button class="btn btn-primary" onclick="closeModal(); render();">Done</button>
      `);
      
      state.currentWorkout = null;
    }
    
    function endWorkout() {
      if (confirm('End workout early?')) {
        state.currentWorkout = null;
        closeModal();
        render();
      }
    }
    
    // Render functions
    function renderWorkout() {
      return `
        <div class="card">
          <h2>Start Your Workout</h2>
          <p class="text-muted" style="margin-bottom: 24px;">
            ${state.mlEnabled ? '📹 Camera & AI enabled' : 'Basic tracking mode'}
          </p>
          
          <button class="btn btn-primary" onclick="startWorkout('A')">
            Workout A
            <div class="text-muted" style="font-size: 0.9rem; margin-top: 4px;">
              Squat · Bench · Row
            </div>
          </button>
          
          <button class="btn btn-primary" onclick="startWorkout('B')">
            Workout B
            <div class="text-muted" style="font-size: 0.9rem; margin-top: 4px;">
              Squat · OHP · Deadlift
            </div>
          </button>
        </div>
      `;
    }
    
    function renderProgress() {
      if (!state.workouts.length) {
        return '<div class="card"><h2>Progress</h2><p class="text-muted">No workouts yet</p></div>';
      }
      
      return `
        <div class="card">
          <h2>Workout History</h2>
          <p class="text-muted">Total: ${state.workouts.length}</p>
        </div>
      `;
    }
    
    function renderProfile() {
      if (!state.user) return '<div class="card"><p>No profile</p></div>';
      
      const weights = Object.entries(state.user.weights).map(([id, w]) => `
        <div style="display: flex; justify-content: space-between; padding: 12px; background: #2a2218; border-radius: 8px; margin-bottom: 8px;">
          <span style="text-transform: capitalize;">${id}</span>
          <strong>${w} lbs</strong>
        </div>
      `).join('');
      
      return `
        <div class="card">
          <h2>Profile</h2>
          <p><strong>Name:</strong> ${state.user.name}</p>
          <p><strong>Experience:</strong> ${state.user.experience}</p>
          <p><strong>AI Features:</strong> ${state.mlEnabled ? 'Enabled ✅' : 'Disabled'}</p>
        </div>
        <div class="card">
          <h2>Current Weights</h2>
          ${weights}
        </div>
      `;
    }
    
    function renderSettings() {
      return `
        <div class="card">
          <h2>Settings</h2>
          
          ${state.mlEnabled ? `
            <h3 style="color: #F4CB80; margin: 20px 0 12px;">Voice Commands</h3>
            <button class="btn btn-secondary" onclick="window.voiceCommands.showCommandsList()">
              View Voice Commands
            </button>
            
            <h3 style="color: #F4CB80; margin: 20px 0 12px;">AI Coaching</h3>
            <button class="btn btn-secondary" onclick="setupGroqAPI()">
              Setup Groq API Key
            </button>
            
            <h3 style="color: #F4CB80; margin: 20px 0 12px;">Storage</h3>
            <button class="btn btn-secondary" onclick="showStorageSettings()">
              Manage Storage
            </button>
          ` : `
            <p class="text-muted">
              AI features are disabled. Complete onboarding again to enable camera,
              voice commands, and form analysis.
            </p>
          `}
        </div>
      `;
    }
    
    function render() {
      const content = document.getElementById('content');
      
      switch(state.currentTab) {
        case 'workout': content.innerHTML = renderWorkout(); break;
        case 'progress': content.innerHTML = renderProgress(); break;
        case 'profile': content.innerHTML = renderProfile(); break;
        case 'settings': content.innerHTML = renderSettings(); break;
      }
    }
    
    // Initialize
    async function init() {
      state.user = loadFromStorage('user');
      state.workouts = loadFromStorage('workouts') || [];
      
      if (state.user) {
        state.mlEnabled = state.user.mlEnabled;
        if (state.mlEnabled) {
          await initializeML();
        }
        render();
      } else {
        startOnboarding();
      }
    }
    
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
